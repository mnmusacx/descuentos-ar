name: Scraper semanal de descuentos AR

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-y-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install anthropic

      - name: Correr scraper con web search
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd scrapers
          python scraper_websearch.py

      - name: Verificar output
        run: |
          python -c "
          import json
          with open('data/descuentos.json') as f:
              d = json.load(f)
          print(f'Período: {d.get(\"periodo\", \"?\")}')
          print(f'Total promos: {d[\"total_promos\"]}')
          print(f'Web search nuevas: {d[\"fuentes\"][\"web_search_nuevas\"]}')
          print(f'De semilla: {d[\"fuentes\"][\"semilla_preservada\"]}')
          print(f'Por categoría: {d[\"por_categoria\"]}')
          for p in d['promos'][:5]:
              score = p.get('score_conveniencia', 0)
              print(f'  [{score}/10] {p[\"entidad\"]}: {p[\"descripcion\"][:55]}')
          "

      - name: Commit y push del JSON actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/descuentos.json
          git diff --cached --quiet || git commit -m "chore: descuentos $(date '+%Y-%m-%d')"
          git push

      - name: Deploy a GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,scrapers,README.md,requirements.txt'
